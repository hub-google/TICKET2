name: Google Flights Scraper

on:
  schedule:
    # 每天 UTC 18:00 執行 (台灣時間凌晨 02:00)
    - cron: '0 18 * * *'
  workflow_dispatch: # 允許手動觸發

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        city: [HND, ICN, SIN, KUL, URC, KMG, SGN, LHR, CDG, MCO, CAI, OSL, FCO, ATH]
      fail-fast: false
      max-parallel: 14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Get Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(pip show playwright | grep Version | cut -d' ' -f2)" >> $GITHUB_ENV

      - name: Cache Playwright Browser
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install chromium
          fi
          playwright install-deps

      - name: Run Scraper for ${{ matrix.city }}
        run: python scraper.py --city ${{ matrix.city }} --ci

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.city }}
          path: ${{ matrix.city }}_results.json
          retention-days: 1

  merge:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code repository
        uses: actions/checkout@v4

      - name: Checkout DATA repository
        uses: actions/checkout@v4
        with:
          repository: hub-google/TICKET2-DATA
          ssh-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
          path: data_repo
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Restore DB from DATA repo
        run: |
          if [ -f data_repo/flights.db ]; then
            cp data_repo/flights.db .
          fi

      - name: Merge DB and export Excel
        run: python merge_db.py

      - name: Commit and Push changes to DATA repo
        run: |
          cp flights.db data_repo/
          cp flights_database.xlsx data_repo/ || echo "No excel file"
          cd data_repo
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flights.db flights_database.xlsx
          git commit -m "Auto-update flights database [skip ci]" || echo "No changes to commit"
          git push
